name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Go test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Install proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0

      - name: Generate proto
        run: make proto

      - name: Download Go modules
        working-directory: control-plane
        run: go mod download

      - name: Go lint
        working-directory: control-plane
        run: go vet ./...

      - name: Go test
        working-directory: control-plane
        run: go test ./...

  test-rust:
    name: Rust test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            data-plane/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('data-plane/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rust clippy
        working-directory: data-plane
        run: cargo clippy

      - name: Rust test
        working-directory: data-plane
        run: cargo test
