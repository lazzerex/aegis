{{- if .Values.controlPlane.config.grpc.tlsCaCert }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aegis.controlPlane.fullname" . }}-ca
  labels:
    {{- include "aegis.controlPlane.labels" . | nindent 4 }}
data:
  ca.crt: |
    {{- .Values.controlPlane.config.grpc.tlsCaCert | nindent 4 }}
{{- end }}
